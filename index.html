    <main class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="mt-12 text-center">
    <button onclick="toggleGaleria()" class="group flex flex-col items-center mx-auto space-y-2 focus:outline-none">

</div>

<div id="galeria-fotos" class="max-h-0 overflow-hidden transition-all duration-700 ease-in-out opacity-0">

        <div class="aspect-square overflow-hidden rounded-sm bg-stone-200 shadow-sm">

        <div class="aspect-square overflow-hidden rounded-sm bg-stone-200 shadow-sm">

    <p class="mt-6 text-stone-400 italic text-sm">Cada momento a tu lado es mi favorito</p>
</div>

            <div class="text-stone-400 text-3xl mt-10 italic">~</div>
        </div>
    </main>

    <script>
function toggleGaleria() {
    const content = document.getElementById('galeria-fotos');
    const icon = document.getElementById('arrow-icon');

    if (content.classList.contains('max-h-0')) {
        // Abrir
        content.classList.remove('max-h-0', 'opacity-0');
        content.classList.add('max-h-[2000px]', 'opacity-100', 'mt-8'); // Ajusta 2000px según el largo de tu galería
        icon.classList.add('rotate-180');
    } else {
        // Cerrar
        content.classList.remove('max-h-[2000px]', 'opacity-100', 'mt-8');
        content.classList.add('max-h-0', 'opacity-0');
        icon.classList.remove('rotate-180');
    }
}
</script>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .animate-fade-in-up {
        animation: fadeInUp 1.5s ease-out forwards;
    }
</style>
