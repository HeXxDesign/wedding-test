<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <main class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-2xl w-full border-2 border-stone-200 p-8 md:p-16 bg-white shadow-sm relative">
            <div class="w-full md:w-2/5 h-72 md:h-auto flex-shrink-0">
                <img 
                    src='imagenes/boda.png' 
                    alt="Boda" 
                    class="w-full h-full object-cover"
                <img/>
            </div>
            <div class="text-stone-400 text-3xl mb-4 italic">~</div>

            <p class="uppercase tracking-widest text-sm mb-6 text-stone-500">¡Nos casamos!</p>
            
            <h1 class="text-5xl md:text-7xl mb-4 font-bold">Claudia & Eduardo</h1>
            
            <div class="w-16 h-px bg-stone-300 mx-auto my-8"></div>
            
            <p class="text-xl mb-2 italic">Acompáñanos en este día tan especial</p>
            
            <div class="space-y-4 my-10">
                <p class="text-2xl font-semibold uppercase tracking-wider">Sábado, 30 de Mayo</p>
                <p class="text-lg">11:00 Horas</p>
                <p class="text-stone-600">Iglesia de San Miguel, La Paz, Bolivia</p>
            </div>

            <button class="mt-8 px-8 py-3 bg-stone-800 text-stone-100 hover:bg-stone-700 transition-colors duration-300 tracking-widest uppercase text-xs">
                Confirmar Asistencia
            </button>

            <div class="text-stone-400 text-3xl mt-10 italic">~</div>
        </div>
    </main>

</body>
</html>
